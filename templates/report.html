<!DOCTYPE html>
<html>
<head>
    <title>Attendance Report</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>Attendance Report</h1>

<table border="1">

<tr>
    <th>Roll No</th>
    <th>Name</th>
    <th>Status</th>
</tr>

{% for r in records %}
<tr>
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
    <td>{{ r[2] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/">Back</a>

</div>

</body>
</html>
